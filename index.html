<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="محلل الطالب">
    <title>محلل الطالب الذكي</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon-192.png">
    <!-- Local Font -->
    <link rel="stylesheet" href="tajawal-local.css">
    <!-- Local Libraries -->
    <script src="xlsx.full.min.js"></script>
    <script src="chart.umd.min.js"></script>
    <script src="jspdf.umd.min.js"></script>
    <script src="html2canvas.min.js"></script>
    <!-- App Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Splash Screen -->
        <div id="splash-screen" class="splash-screen">
            <div class="splash-content">
                <div class="splash-icon">
                    <svg viewBox="0 0 120 120" width="80" height="80">
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <rect rx="24" width="120" height="120" fill="url(#grad1)"/>
                        <path d="M35 40 L60 25 L85 40 L85 80 L35 80 Z" fill="none" stroke="white" stroke-width="3"/>
                        <circle cx="60" cy="55" r="12" fill="none" stroke="white" stroke-width="2.5"/>
                        <path d="M55 55 L58 58 L66 50" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <line x1="60" y1="67" x2="60" y2="75" stroke="white" stroke-width="2.5"/>
                    </svg>
                </div>
                <h1 class="splash-title">محلل الطالب الذكي</h1>
                <p class="splash-subtitle">إصدار المعلم المحمول</p>
                <div class="splash-loader">
                    <div class="splash-loader-bar"></div>
                </div>
            </div>
        </div>

        <!-- Main Layout -->
        <div id="main-app" class="main-app hidden">
            <!-- Header -->
            <header class="app-header">
                <div class="header-right">
                    <button class="menu-btn" onclick="toggleSidebar()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <h1 class="header-title" id="headerTitle">لوحة التحكم</h1>
                </div>
                <div class="header-left"><div id="headerClassSelector" class="header-class-selector"></div>
                    <button class="header-btn" onclick="showSearch()" title="بحث">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </button>
                </div>
            </header>

            <!-- Sidebar -->
            <div id="sidebar-overlay" class="sidebar-overlay hidden" onclick="toggleSidebar()"></div>
            <nav id="sidebar" class="sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-logo">
                        <svg viewBox="0 0 48 48" width="40" height="40">
                            <rect rx="10" width="48" height="48" fill="url(#grad1)"/>
                            <path d="M14 16 L24 10 L34 16 L34 34 L14 34 Z" fill="none" stroke="white" stroke-width="1.5"/>
                            <circle cx="24" cy="23" r="5" fill="none" stroke="white" stroke-width="1.5"/>
                            <path d="M22 23 L23.5 24.5 L27 21" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div>
                        <h3 class="sidebar-brand">محلل الطالب</h3>
                        <p class="sidebar-version">الإصدار 3.0</p>
                    </div>
                </div>
                <ul class="sidebar-menu">
                    <li class="sidebar-item" data-page="levels" onclick="navigateTo('levels')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span>الصفوف الدراسية</span></li>
                    <li class="sidebar-item active" data-page="dashboard" onclick="navigateTo('dashboard')">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                        <span>لوحة التحكم</span>
                    </li>
                    <li class="sidebar-item" data-page="students" onclick="navigateTo('students')">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        <span>قائمة الطلاب</span>
                    </li>
                    <li class="sidebar-item" data-page="import" onclick="navigateTo('import')">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        <span>استيراد ملفات</span>
                    </li>
                    <li class="sidebar-item" data-page="groups" onclick="navigateTo('groups')">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                        <span>المجموعات</span>
                    </li>
                    <li class="sidebar-item" data-page="reports" onclick="navigateTo('reports')">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                        <span>التقارير</span>
                    </li>
                    <li class="sidebar-item" data-page="settings" onclick="navigateTo('settings')">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        <span>الإعدادات</span>
                    </li>
                </ul>
                <div class="sidebar-footer">
                    <div class="sidebar-stat">
                        <span id="sidebarStudentCount">0</span> طالب
                    </div>
                    <div class="sidebar-stat">
                        <span id="sidebarFileCount">0</span> ملف
                    </div>
                </div>
            </nav>

            <!-- Search Modal -->
            <div id="searchModal" class="modal hidden">
                <div class="modal-content search-modal-content">
                    <div class="search-input-wrap">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6366F1" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="searchInput" placeholder="ابحث عن طالب..." oninput="handleSearch(this.value)" autocomplete="off">
                        <button class="search-close" onclick="hideSearch()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                    <div id="searchResults" class="search-results"></div>
                </div>
            </div>

            <!-- Content Area -->
            <main class="content-area" id="contentArea">
                <!-- Pages will be rendered here -->
            </main>

            <!-- Bottom Navigation -->
            <nav class="bottom-nav">
                <button class="bottom-nav-item active" data-page="dashboard" onclick="navigateTo('dashboard')">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    <span>الرئيسية</span>
                </button>
                <button class="bottom-nav-item" data-page="students" onclick="navigateTo('students')">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    <span>الطلاب</span>
                </button>
                <button class="bottom-nav-item import-btn" data-page="import" onclick="navigateTo('import')">
                    <div class="import-btn-circle">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </div>
                    <span>استيراد</span>
                </button>
                <button class="bottom-nav-item" data-page="groups" onclick="navigateTo('groups')">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                    <span>المجموعات</span>
                </button>
                <button class="bottom-nav-item" data-page="settings" onclick="navigateTo('settings')">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span>المزيد</span>
                </button>
            </nav>
        </div>

        <!-- Student Detail Modal -->
        <div id="studentModal" class="modal hidden">
            <div class="modal-content modal-fullscreen student-modal-content" id="studentModalContent">
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toastContainer" class="toast-container"></div>
    </div>

    <script src="db.js"></script>
    <script src="excel.js"></script>
    <script src="analyzer.js"></script>
    <script src="charts.js"></script>
    <script src="reports.js"></script>
    <script src="groups.js"></script>
    <script src="app.js"></script>
</body>
</html>
